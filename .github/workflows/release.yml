name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.5
          chmod +x gradlew

      - name: Extract version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Patch versionName in build.gradle.kts
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          echo "Patched versionName to $VERSION"
          grep versionName app/build.gradle.kts

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "app/build/outputs/apk/release/CopilotPulse-${VERSION}.apk" \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f keystore.jks

      - name: Use unsigned APK if no signing key
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             "app/build/outputs/apk/release/CopilotPulse-${VERSION}.apk"
          echo "Note: APK is unsigned. Add KEYSTORE_BASE64 secret for signed releases."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(env.VERSION, '-') }}
          generate_release_notes: true
          body: |
            ## Installation
            1. Download `CopilotPulse-${{ env.VERSION }}.apk`
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK
            4. Open the app and paste your GitHub PAT with `copilot` scope
          files: app/build/outputs/apk/release/CopilotPulse-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
